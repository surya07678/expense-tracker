<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile – SpendWise</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app-layout">
    <div id="sidebar-container"></div>
    <div class="main-content">
        <div id="topbar-container"></div>

        <div class="page-content">
            <div style="max-width:700px;margin:0 auto">
                <div style="margin-bottom:24px">
                    <h2 style="font-size:22px;font-weight:700">Profile Settings</h2>
                    <p style="color:var(--text-muted);font-size:13px;margin-top:2px">Manage your account preferences</p>
                </div>

                <!-- Profile Card -->
                <div class="card fade-in-up" style="margin-bottom:18px">
                    <div style="display:flex;align-items:center;gap:20px;margin-bottom:28px;padding-bottom:24px;border-bottom:1px solid var(--border)">
                        <div id="profileAvatar" style="width:72px;height:72px;background:linear-gradient(135deg,#4F46E5,#8B5CF6);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;color:#fff;flex-shrink:0">
                            U
                        </div>
                        <div>
                            <div id="profileName" style="font-size:20px;font-weight:700">Loading...</div>
                            <div id="profileEmail" style="font-size:14px;color:var(--text-muted);margin-top:3px">loading...</div>
                            <div id="profileSince" style="font-size:12px;color:var(--text-muted);margin-top:2px">Member since...</div>
                        </div>
                    </div>

                    <form id="profileForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Full Name</label>
                                <input type="text" id="inputName" class="form-control" placeholder="Your name" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Currency</label>
                                <select id="inputCurrency" class="form-control">
                                    <option value="USD">🇺🇸 USD – US Dollar</option>
                                    <option value="EUR">🇪🇺 EUR – Euro</option>
                                    <option value="GBP">🇬🇧 GBP – British Pound</option>
                                    <option value="INR">🇮🇳 INR – Indian Rupee</option>
                                    <option value="JPY">🇯🇵 JPY – Japanese Yen</option>
                                    <option value="CAD">🇨🇦 CAD – Canadian Dollar</option>
                                    <option value="AUD">🇦🇺 AUD – Australian Dollar</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary" id="saveBtn">Save Changes</button>
                    </form>
                </div>

                <!-- Account Stats -->
                <div class="card fade-in-up" style="margin-bottom:18px">
                    <div class="card-title" style="margin-bottom:18px">📊 Account Statistics</div>
                    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px" id="accountStats">
                        <div style="text-align:center;padding:16px;background:var(--bg-input);border-radius:10px">
                            <div style="font-size:24px;font-weight:700;color:var(--primary)" id="statTx">–</div>
                            <div style="font-size:12px;color:var(--text-muted);margin-top:4px">Transactions</div>
                        </div>
                        <div style="text-align:center;padding:16px;background:var(--bg-input);border-radius:10px">
                            <div style="font-size:24px;font-weight:700;color:var(--success)" id="statInc">–</div>
                            <div style="font-size:12px;color:var(--text-muted);margin-top:4px">Total Income</div>
                        </div>
                        <div style="text-align:center;padding:16px;background:var(--bg-input);border-radius:10px">
                            <div style="font-size:24px;font-weight:700;color:var(--danger)" id="statExp">–</div>
                            <div style="font-size:12px;color:var(--text-muted);margin-top:4px">Total Expenses</div>
                        </div>
                    </div>
                </div>

                <!-- Data Management -->
                <div class="card fade-in-up">
                    <div class="card-title" style="margin-bottom:18px">🔧 Data Management</div>
                    <div style="display:flex;gap:12px;flex-wrap:wrap">
                        <button class="btn btn-outline" onclick="TransactionsAPI.exportCSV()">
                            📤 Export All Data (CSV)
                        </button>
                        <button class="btn btn-danger" onclick="confirmLogout()">
                            🚪 Logout
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="sidebar-overlay"></div>
<div class="toast-container"></div>

<script src="/js/api.js"></script>
<script src="/js/layout.js"></script>
<script>
    if (!Auth.requireAuth()) throw new Error('Not authenticated');
    renderLayout('Profile', 'Account settings');

    // ── Load Profile ─────────────────────────────────────────────
    async function loadProfile() {
        const res = await AuthAPI.getMe();
        if (!res?.ok) return;

        const user = res.data.user;
        Auth.setUser(user); // update cached user

        document.getElementById('profileAvatar').textContent = user.name.charAt(0).toUpperCase();
        document.getElementById('profileName').textContent   = user.name;
        document.getElementById('profileEmail').textContent  = user.email;
        document.getElementById('profileSince').textContent  = 'Member since ' + Format.date(user.created_at?.split('T')[0]);

        document.getElementById('inputName').value     = user.name;
        document.getElementById('inputCurrency').value = user.currency || 'INR';
    }

    // ── Load Stats ───────────────────────────────────────────────
    async function loadStats() {
        const [summaryRes, allRes] = await Promise.all([
            TransactionsAPI.getSummary(),
            TransactionsAPI.getAll({ limit: 1 })
        ]);

        if (summaryRes?.ok) {
            const { summary } = summaryRes.data;
            const user = Auth.getUser();
            const currency = user?.currency || 'USD';

            document.getElementById('statInc').textContent = Format.currency(summary.totalIncome, currency);
            document.getElementById('statExp').textContent = Format.currency(summary.totalExpense, currency);
        }

        if (allRes?.ok) {
            document.getElementById('statTx').textContent = allRes.data.total;
        }
    }

    // ── Save Profile ──────────────────────────────────────────────
    document.getElementById('profileForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const btn = document.getElementById('saveBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Saving...';

        const payload = {
            name:      document.getElementById('inputName').value.trim(),
            currency:  document.getElementById('inputCurrency').value
        };

        const res = await AuthAPI.updateProfile(payload);
        btn.disabled = false;
        btn.textContent = 'Save Changes';

        if (res?.ok) {
            Toast.success('✅ Profile updated successfully!');
            // Update sidebar avatar
            const user = Auth.getUser();
            if (user) {
                const updated = { ...user, ...payload };
                Auth.setUser(updated);
                document.querySelectorAll('.user-name').forEach(el => el.textContent = payload.name);
                document.getElementById('profileAvatar').textContent = payload.name.charAt(0).toUpperCase();
                document.getElementById('profileName').textContent = payload.name;
            }
        } else {
            Toast.error(res?.data?.message || 'Update failed.');
        }
    });

    function confirmLogout() {
        if (confirm('Are you sure you want to logout?')) Auth.logout();
    }

    // Initialize
    loadProfile();
    loadStats();
</script>
</body>
</html>
