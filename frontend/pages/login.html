<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – SpendWise</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="auth-page">
    <div class="auth-card">
        <!-- Logo -->
        <div class="auth-logo">
            <div class="auth-logo-icon">💰</div>
            <div>
                <div style="font-size:20px;font-weight:700">SpendWise</div>
                <div style="font-size:12px;color:var(--text-muted)">Smart Money Tracker</div>
            </div>
        </div>

        <!-- Title -->
        <div class="auth-title">Welcome back!</div>
        <div class="auth-subtitle">Sign in to manage your finances.</div>

        <!-- Form -->
        <form id="loginForm" style="margin-top:28px">
            <div class="form-group">
                <label class="form-label">Email address</label>
                <input type="email" id="email" class="form-control" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label class="form-label" style="display:flex;justify-content:space-between">
                    Password
                    <a href="#" class="auth-link" style="font-weight:500;font-size:12px">Forgot password?</a>
                </label>
                <div style="position:relative">
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password" style="padding-right:44px">
                    <button type="button" id="togglePwd" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--text-muted)">👁️</button>
                </div>
            </div>

            <!-- Error message -->
            <div id="errorMsg" style="display:none;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#EF4444;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px"></div>

            <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">
                Sign In
            </button>
        </form>

        <div class="auth-divider" style="margin:22px 0">or</div>

        <!-- Demo account -->
        <button id="demoBtn" class="btn btn-outline btn-block" style="margin-bottom:22px">
            🎮 Try with demo account
        </button>

        <p style="text-align:center;font-size:14px;color:var(--text-muted)">
            Don't have an account? <a href="/signup" class="auth-link">Sign up free</a>
        </p>
    </div>
</div>

<script src="/js/api.js"></script>
<script>
    // Redirect if already logged in
    Auth.redirectIfLoggedIn();

    const form       = document.getElementById('loginForm');
    const submitBtn  = document.getElementById('submitBtn');
    const errorMsg   = document.getElementById('errorMsg');
    const togglePwd  = document.getElementById('togglePwd');
    const pwdInput   = document.getElementById('password');

    // Toggle password visibility
    togglePwd.addEventListener('click', () => {
        const isText = pwdInput.type === 'text';
        pwdInput.type = isText ? 'password' : 'text';
        togglePwd.textContent = isText ? '👁️' : '🙈';
    });

    // Show error
    function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.style.display = 'block';
    }
    function hideError() { errorMsg.style.display = 'none'; }

    // Handle login form submit
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError();

        const email    = document.getElementById('email').value.trim();
        const password = pwdInput.value;

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner"></span> Signing in...';

        const res = await AuthAPI.login({ email, password });

        if (res?.ok && res.data?.success) {
            Auth.setToken(res.data.token);
            Auth.setUser(res.data.user);
            Toast.success('Welcome back, ' + res.data.user.name + '!');
            setTimeout(() => { window.location.href = '/dashboard'; }, 600);
        } else {
            showError(res?.data?.message || 'Login failed. Please try again.');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Sign In';
        }
    });

    // Demo account login
    document.getElementById('demoBtn').addEventListener('click', async () => {
        document.getElementById('email').value = 'demo@example.com';
        document.getElementById('password').value = 'demo1234';
        form.dispatchEvent(new Event('submit'));
    });
</script>
</body>
</html>
